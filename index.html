<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>轻量笔记</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>轻量笔记</h1>
        <p>本地离线，自动保存。双击编辑，Enter 保存。</p>
        <div class="header-controls">
          <button id="editModeBtn" class="edit-mode-btn">✏️ 编辑界面</button>
          <button id="resetBtn" class="reset-btn">🔄 还原模板</button>
        </div>
      </header>

      <div class="container">
        <!-- 左侧目录 -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <h2>目录</h2>
            <div class="sidebar-controls">
              <select id="sortSelect" class="sort-select">
                <option value="name">按名称排序</option>
                <option value="date">按日期排序</option>
              </select>
              <button id="validateBtn" class="ghost" title="验证目录结构">验证</button>
              <button id="resetFoldersBtn" class="ghost" title="重置目录结构">重置</button>
              <button id="addFolderBtn" class="ghost" title="添加自定义目录（右键自定义目录可删除）">+</button>
            </div>
          </div>
          <div id="folderTree" class="folder-tree"></div>
        </aside>

        <!-- 右侧笔记区 -->
        <div class="main-content">
          <!-- 搜索框 -->
          <div class="search-bar">
            <input id="searchInput" type="search" placeholder="搜索笔记…" />
          </div>

          <section class="compose">
            <div class="folder-path" id="currentFolder">所有笔记</div>
            <input id="titleInput" type="text" placeholder="标题" />
            <textarea id="contentInput" rows="5" placeholder="写点什么…"></textarea>
            <div class="actions">
              <button id="addBtn">新增笔记</button>
              <button id="clearBtn" class="ghost">清空</button>
            </div>
          </section>

          <!-- 规格信息区域 -->
          <section id="specsContainer" class="specs-section" style="display: none;"></section>

          <section class="list">
            <div class="list-header">
              <h2>笔记列表</h2>
            </div>
            <div id="notes"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
